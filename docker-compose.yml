services:
  db:
    image: postgres:16
    container_name: tododb
    environment:
      POSTGRES_USER: smilelylion
      POSTGRES_PASSWORD: password1234
      POSTGRES_DB: tododb
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

  vault-init:
    image: hashicorp/vault:1.17
    container_name: vault-init
    depends_on:
      - vault
    env_file:
      - .env
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-token"
    command: >
      sh -c "sleep 3 && vault kv put secret/todolistapp db_password=$$DB_PASSWORD database_url=$$DATABASE_URL"
    restart: "no"

volumes:
  postgres_data:
